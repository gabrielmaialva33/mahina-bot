services:
  warp:
    image: caomingjun/warp
    container_name: warp-socks
    restart: unless-stopped
    environment:
      - WARP_SLEEP=2
    cap_add:
      - NET_ADMIN
    sysctls:
      - net.ipv6.conf.all.disable_ipv6=1
      - net.ipv4.conf.all.src_valid_mark=1
    volumes:
      - warp-data:/var/lib/cloudflare-warp
    healthcheck:
      test:
        ['CMD', 'curl', '-f', '--socks5', 'localhost:1080', 'https://cloudflare.com/cdn-cgi/trace']
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 15s
    networks:
      - shared

  yt-cipher:
    image: ghcr.io/kikkia/yt-cipher:master
    container_name: yt-cipher
    restart: unless-stopped
    environment:
      - OVERRIDE_PLAYER_VARIANT=IAS
      - API_TOKEN=${YT_CIPHER_PASSWORD:-mahina-cipher-secret}
    networks:
      - shared

  lavalink:
    build:
      context: .
      dockerfile: Dockerfile.lavalink
    container_name: mahina-lavalink
    restart: unless-stopped
    depends_on:
      - yt-cipher
      - warp
    environment:
      SERVER_PORT: 2333
      _JAVA_OPTIONS: -Xmx2G -DsocksProxyHost=warp-socks -DsocksProxyPort=1080 -Djava.net.preferIPv4Stack=true
      LAVALINK_PASSWORD: ${LAVALINK_PASSWORD:-youshallnotpass}
      SPOTIFY_CLIENT_ID: ${SPOTIFY_CLIENT_ID:-}
      SPOTIFY_CLIENT_SECRET: ${SPOTIFY_CLIENT_SECRET:-}
      YT_OAUTH_ENABLED: ${YT_OAUTH_ENABLED:-false}
      YT_OAUTH_REFRESH_TOKEN: ${YT_OAUTH_REFRESH_TOKEN:-}
      YT_OAUTH_SKIP_INIT: ${YT_OAUTH_SKIP_INIT:-true}
      YT_POT_TOKEN: ${YT_POT_TOKEN:-}
      YT_POT_VISITOR_DATA: ${YT_POT_VISITOR_DATA:-}
      YT_CIPHER_URL: http://yt-cipher:8001/
      YT_CIPHER_PASSWORD: ${YT_CIPHER_PASSWORD:-mahina-cipher-secret}
    volumes:
      - ./application.yml:/opt/Lavalink/application.yml:ro
      - ./lavalink/plugins:/opt/Lavalink/plugins:ro
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'curl -H "Authorization: ${LAVALINK_PASSWORD:-youshallnotpass}" -s http://localhost:2333/version >/dev/null || exit 1',
        ]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 20s
    networks:
      - shared

  mahina:
    image: ghcr.io/gabrielmaialva33/mahina-bot:latest
    container_name: mahina-bot
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      lavalink:
        condition: service_healthy
    environment:
      REDIS_URL: redis://redis:6379
      NODES: '[{"id":"docker","host":"mahina-lavalink","port":2333,"authorization":"${LAVALINK_PASSWORD:-youshallnotpass}","retryAmount":5,"retryDelay":60000,"secure":false}]'
    networks:
      - shared

volumes:
  warp-data:

networks:
  shared:
    external: true
    name: shared_network
