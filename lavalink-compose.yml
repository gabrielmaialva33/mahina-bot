services:
  mahina-lavalink:
    image: ghcr.io/lavalink-devs/lavalink:4.2.2
    container_name: mahina-lavalink
    restart: unless-stopped
    environment:
      SERVER_PORT: 2333
      _JAVA_OPTIONS: -Xmx6G
      LAVALINK_PASSWORD: ${LAVALINK_PASSWORD:-change-me-lavalink-password}
      SPOTIFY_CLIENT_ID: ${SPOTIFY_CLIENT_ID:-}
      SPOTIFY_CLIENT_SECRET: ${SPOTIFY_CLIENT_SECRET:-}
    volumes:
      - ./application.yml:/opt/Lavalink/application.yml:ro
      - ./lavalink/plugins:/opt/Lavalink/plugins:ro
      - lavalink-logs:/opt/Lavalink/logs
    ports:
      - '2333:2333'
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'curl -H "Authorization: ${LAVALINK_PASSWORD:-change-me-lavalink-password}" -s http://localhost:2333/version >/dev/null || exit 1',
        ]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 20s
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: '3'

volumes:
  lavalink-logs:
