name: Build & Deploy

on:
  push:
    branches: [master]
  workflow_dispatch:

env:
  IMAGE: ghcr.io/gabrielmaialva33/mahina-bot

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint

  build:
    needs: lint
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=sha,prefix=
            type=raw,value=latest

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build
    runs-on: ubuntu-latest
    # Deploy is best-effort — Watchtower on VPS auto-pulls if SSH fails
    continue-on-error: true
    timeout-minutes: 5

    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          command_timeout: 3m
          script: |
            set -e
            cd /opt/mahina-bot
            docker pull ghcr.io/gabrielmaialva33/mahina-bot:latest
            docker compose up -d --remove-orphans
            docker compose exec -T mahina sh -c 'node $(find node_modules -path "*/prisma/build/index.js" | head -1) db push --skip-generate'
            docker image prune -f
            docker compose ps

      - name: Deploy status
        if: failure()
        run: echo "⚠️ SSH deploy failed — Watchtower will auto-pull the new image within ~2 minutes"
