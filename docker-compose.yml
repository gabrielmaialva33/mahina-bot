services:
  redis:
    image: redis:8-alpine
    restart: unless-stopped
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:-change-me-redis-password}
    command: >-
      sh -c 'redis-server --requirepass "$$REDIS_PASSWORD" --appendonly yes --appendfsync everysec'
    ports:
      - '6381:6379'
    volumes:
      - redis-data:/data
    healthcheck:
      test: ['CMD-SHELL', 'redis-cli -a "$$REDIS_PASSWORD" ping | grep PONG']
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 10s

  yt-cipher:
    image: ghcr.io/kikkia/yt-cipher:master
    restart: unless-stopped
    environment:
      - OVERRIDE_PLAYER_VARIANT=IAS
      - API_TOKEN=${YT_CIPHER_PASSWORD:-mahina-cipher-secret}

  lavalink:
    build:
      context: .
      dockerfile: Dockerfile.lavalink
    restart: unless-stopped
    depends_on:
      - yt-cipher
    environment:
      SERVER_PORT: 2333
      _JAVA_OPTIONS: -Xmx6G
      LAVALINK_PASSWORD: ${LAVALINK_PASSWORD:-change-me-lavalink-password}
      SPOTIFY_CLIENT_ID: ${SPOTIFY_CLIENT_ID:-}
      SPOTIFY_CLIENT_SECRET: ${SPOTIFY_CLIENT_SECRET:-}
      YT_OAUTH_ENABLED: ${YT_OAUTH_ENABLED:-false}
      YT_OAUTH_REFRESH_TOKEN: ${YT_OAUTH_REFRESH_TOKEN:-}
      YT_OAUTH_SKIP_INIT: ${YT_OAUTH_SKIP_INIT:-true}
      YT_POT_TOKEN: ${YT_POT_TOKEN:-}
      YT_POT_VISITOR_DATA: ${YT_POT_VISITOR_DATA:-}
      YT_CIPHER_URL: http://yt-cipher:8001/
      YT_CIPHER_PASSWORD: ${YT_CIPHER_PASSWORD:-mahina-cipher-secret}
    volumes:
      - ./application.yml:/opt/Lavalink/application.yml:ro
      - ./lavalink/plugins:/opt/Lavalink/plugins:ro
      - lavalink-logs:/opt/Lavalink/logs
    ports:
      - '2333:2333'
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'curl -H "Authorization: ${LAVALINK_PASSWORD:-change-me-lavalink-password}" -s http://localhost:2333/version >/dev/null || exit 1',
        ]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 20s
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: '3'

  mahina:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NODE_VERSION: 25
        PNPM_VERSION: 10.32.1
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      redis:
        condition: service_healthy
      lavalink:
        condition: service_healthy
    environment:
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: redis://:${REDIS_PASSWORD:-change-me-redis-password}@redis:6379
      AI_QUEUE_ENABLED: ${AI_QUEUE_ENABLED:-true}
      AUTO_NODE: ${AUTO_NODE:-true}
      PORT: ${PORT:-3050}
      NODES: '[{"id":"docker","host":"lavalink","port":2333,"authorization":"${LAVALINK_PASSWORD:-change-me-lavalink-password}","retryAmount":5,"retryDelay":60000,"secure":false}]'
    ports:
      - '${PORT:-3050}:${PORT:-3050}'

volumes:
  redis-data:
  lavalink-logs:
