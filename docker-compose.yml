services:
  mongodb:
    image: mongo:8
    restart: unless-stopped
    ports:
      - '27017:27017'
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ['CMD-SHELL', 'echo "db.runCommand({ ping: 1 }).ok" | mongosh localhost:27017/admin --quiet | grep 1']
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 20s

  redis:
    image: redis:8-alpine
    restart: unless-stopped
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:-change-me-redis-password}
    command: >-
      sh -c 'redis-server --requirepass "$$REDIS_PASSWORD" --appendonly yes --appendfsync everysec'
    ports:
      - '6381:6379'
    volumes:
      - redis-data:/data
    healthcheck:
      test: ['CMD-SHELL', 'redis-cli -a "$$REDIS_PASSWORD" ping | grep PONG']
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 10s

  lavalink:
    image: ghcr.io/lavalink-devs/lavalink:4.2.2
    restart: unless-stopped
    environment:
      SERVER_PORT: 2333
      _JAVA_OPTIONS: -Xmx6G
      LAVALINK_PASSWORD: ${LAVALINK_PASSWORD:-change-me-lavalink-password}
      SPOTIFY_CLIENT_ID: ${SPOTIFY_CLIENT_ID:-}
      SPOTIFY_CLIENT_SECRET: ${SPOTIFY_CLIENT_SECRET:-}
    volumes:
      - ./application.yml:/opt/Lavalink/application.yml:ro
      - ./lavalink/plugins:/opt/Lavalink/plugins:ro
      - lavalink-logs:/opt/Lavalink/logs
    ports:
      - '2333:2333'
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'curl -H "Authorization: ${LAVALINK_PASSWORD:-change-me-lavalink-password}" -s http://localhost:2333/version >/dev/null || exit 1',
        ]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 20s
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: '3'

  mahina:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NODE_VERSION: 25
        PNPM_VERSION: 10.32.1
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
      lavalink:
        condition: service_healthy
    environment:
      DATABASE_URL: ${DATABASE_URL:-mongodb://mongodb:27017/mahina}
      REDIS_URL: redis://:${REDIS_PASSWORD:-change-me-redis-password}@redis:6379
      AI_QUEUE_ENABLED: ${AI_QUEUE_ENABLED:-true}
      AUTO_NODE: ${AUTO_NODE:-true}
      PORT: ${PORT:-3050}
      NODES: '[{"id":"docker","host":"lavalink","port":2333,"authorization":"${LAVALINK_PASSWORD:-change-me-lavalink-password}","retryAmount":5,"retryDelay":60000,"secure":false}]'
    ports:
      - '${PORT:-3050}:${PORT:-3050}'

volumes:
  mongo-data:
  redis-data:
  lavalink-logs:
