services:
  lavalink:
    container_name: lavalink
    image: ghcr.io/lavalink-devs/lavalink:4.2.2
    restart: on-failure
    environment:
      - _JAVA_OPTIONS=-Xmx6G
      - SERVER_PORT=2333
    volumes:
      - ./application.yml:/opt/Lavalink/application.yml
      - ./lavalink/plugins/:/opt/Lavalink/plugins/
    networks:
      - lavalink-net
    expose:
      - 2333
    ports:
      - '2333:2333'
    healthcheck:
      test: 'curl -H "Authorization: Mahina@551238" -s http://localhost:2333/version'
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 10s

  mahina:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mahina
    restart: always
    expose:
      - 3000
      - 3024
    ports:
      - '3024:3000'
    depends_on:
      - lavalink
      - mahina-database
      - mahina-redis
    env_file:
      - .env
    environment:
      TOKEN: ${TOKEN}
      CLIENT_ID: ${CLIENT_ID}
      DEFAULT_LANGUAGE: ${DEFAULT_LANGUAGE}
      PREFIX: ${PREFIX}
      OWNER_IDS: ${OWNER_IDS}
      GUILD_ID: ${GUILD_ID}
      TOPGG: ${TOPGG}
      KEEP_ALIVE: ${KEEP_ALIVE}
      LOG_CHANNEL_ID: ${LOG_CHANNEL_ID}
      LOG_COMMANDS_ID: ${LOG_COMMANDS_ID}
      BOT_STATUS: ${BOT_STATUS}
      BOT_ACTIVITY_TYPE: ${BOT_ACTIVITY_TYPE}
      BOT_ACTIVITY: ${BOT_ACTIVITY}
      DATABASE_URL: ${DATABASE_URL:-mongodb://mahina-database:27017/mahina}
      AUTO_NODE: ${AUTO_NODE}
      SEARCH_ENGINE: ${SEARCH_ENGINE}
      GENIUS_API: ${GENIUS_API}
      NODES: '[{"id":"Docker-Node","host":"lavalink","port":2333,"authorization":"Mahina@551238","retryAmount":5,"retryDelay":60000,"secure":false}]'
      NVIDIA_API_KEY: ${NVIDIA_API_KEY}
      REDIS_URL: redis://:${REDIS_PASSWORD:-mahina_redis_2024}@mahina-redis:6379
      AI_QUEUE_ENABLED: ${AI_QUEUE_ENABLED:-true}
    networks:
      - lavalink-net

  # Default database: MongoDB
  mahina-database:
    image: mongo:7
    container_name: mahina-database
    restart: always
    ports:
      - '27017:27017'
    volumes:
      - mahina-mongo-data:/data/db
    networks:
      - lavalink-net
    healthcheck:
      test: ['CMD-SHELL', 'echo "db.runCommand({ ping: 1 }).ok" | mongosh localhost:27017/test --quiet | grep 1']
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis for caching and pub/sub
  mahina-redis:
    image: redis:7-alpine
    container_name: mahina-redis
    restart: always
    command: redis-server --requirepass ${REDIS_PASSWORD:-mahina_redis_2024} --appendonly yes --appendfsync everysec
    ports:
      - '6380:6379'
    volumes:
      - mahina-redis-data:/data
    networks:
      - lavalink-net
    healthcheck:
      test: ['CMD', 'redis-cli', '--raw', 'incr', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  lavalink-net:
    name: lavalink-net

volumes:
  mahina-mongo-data:
  mahina-redis-data:
